# docker-compose.dev.yml  —  Local development (hot reload, no model pre-download)
#
# Usage:  docker compose -f docker-compose.dev.yml up --build

version: "3.9"

services:
  document-service-dev:
    build:
      context: .
      target: cpu
    image: document-service:dev
    container_name: document-service-dev
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DEVICE=cpu
      - OCR_USE_GPU=false
      - VLM_USE_FLASH_ATTENTION=false
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - RELOAD=true
    volumes:
      - ./app:/app/app          # Live code reload
      - hf_cache_dev:/models/hf_cache
      - tmp_dev:/tmp/docservice
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  hf_cache_dev:
  tmp_dev:
