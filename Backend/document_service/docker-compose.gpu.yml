# docker-compose.gpu.yml  —  GPU overlay
#
# Extends the base compose file with NVIDIA GPU access.
# Requirements:  NVIDIA Container Toolkit installed on the host
#                (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

version: "3.9"

services:
  document-service:
    build:
      context: .
      target: gpu          # Switch to the GPU build stage
    image: document-service:gpu
    environment:
      - DEVICE=auto        # resolve_device() picks cuda:0 automatically
      - OCR_USE_GPU=true
      - VLM_USE_FLASH_ATTENTION=false
      - VLM_DTYPE=auto     # bfloat16 on Ampere+, float16 on older cards
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1          # Change to "all" to expose all GPUs
              capabilities: [gpu]
        limits:
          memory: 12G      # bfloat16 model ~2.5GB + PaddleOCR GPU + headroom
