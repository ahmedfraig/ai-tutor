# docker-compose.yml  —  CPU production stack

services:
  document-service:
    build:
      context: .
      target: cpu
    image: document-service:cpu
    container_name: document-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DEVICE=cpu
      - OCR_USE_GPU=false
      - VLM_USE_FLASH_ATTENTION=false
      - ENVIRONMENT=production
      - OMP_NUM_THREADS=4
      - CPU_PAGE_CAP=10
      - REQUEST_TIMEOUT_SECONDS=300
    volumes:
      - hf_cache:/models/hf_cache
      - tmp_data:/tmp/docservice
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  hf_cache:
    driver: local
  tmp_data:
    driver: local